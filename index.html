<title>EdgeCalc Pro — Projections</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a0f;--surface:#0e1118;--card:#13161f;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:rgba(255,255,255,0.3);--dim:rgba(255,255,255,0.1);--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--active-color:#F97316;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:.05em;line-height:1}
.logo-accent{color:var(--active-color)}
.logo-sub{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.16em;display:block;margin-top:1px}
.header-meta{display:flex;align-items:center;gap:10px}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--muted);border:1px solid var(--border);padding:3px 9px;border-radius:3px}
.league-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.league-bar::-webkit-scrollbar{display:none}
.ltab{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.1em;padding:11px 15px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.ltab.active{color:var(--active-color);border-bottom-color:var(--active-color)}
.ltab:hover:not(.active){color:rgba(255,255,255,0.55)}
.ltab-count{font-size:9px;font-weight:700;background:var(--active-color);color:#000;border-radius:3px;padding:1px 5px;opacity:0;transition:opacity .15s}
.ltab.active .ltab-count,.ltab:hover .ltab-count{opacity:1}
main{flex:1;padding:18px 24px 32px;max-width:1000px;margin:0 auto;width:100%}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.fetch-btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;padding:8px 16px;border-radius:6px;border:none;background:var(--active-color);color:#000;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.fetch-btn:disabled{opacity:.4;cursor:not-allowed}
.run-btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;padding:8px 16px;border-radius:6px;border:1.5px solid var(--active-color);background:transparent;color:var(--active-color);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.run-btn:disabled{opacity:.4;cursor:not-allowed}
.copy-btn-top{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;margin-left:auto}
.copy-btn-top:hover{border-color:var(--active-color);color:var(--active-color)}
.meta-pill{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em}
.schedule-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.18em;color:var(--muted);display:flex;align-items:center;gap:8px}
.section-label::after{content:'';display:block;width:40px;height:1px;background:var(--border)}
.add-manual{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.add-manual:hover{border-color:var(--active-color);color:var(--active-color)}
.schedule-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.sched-item{background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;padding:10px 14px;gap:10px;cursor:pointer;transition:border-color .15s}
.sched-item:hover{border-color:rgba(255,255,255,0.14)}
.sched-item.selected{border-color:var(--active-color);background:rgba(255,165,0,0.04)}
.sched-time{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);min-width:48px;flex-shrink:0}
.sched-teams{flex:1;display:flex;align-items:center;min-width:0;gap:4px}
.sched-team{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sched-team.home{flex-direction:row-reverse}
.sched-logo{width:26px;height:26px;object-fit:contain;flex-shrink:0}
.sched-logo-ph{width:26px;height:26px;border-radius:4px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:var(--muted);flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.sched-team-info{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.sched-team.home .sched-team-info{align-items:flex-end}
.sched-team-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:var(--text);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-record{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--muted)}
.sched-at{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;color:var(--dim);padding:0 6px;flex-shrink:0}
.sched-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.sched-item.selected .sched-check{background:var(--active-color);border-color:var(--active-color);color:#000}
.sched-remove{font-size:13px;color:var(--dim);cursor:pointer;padding:2px 6px;border:none;background:none;flex-shrink:0}
.sched-remove:hover{color:var(--red)}
.add-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.team-input{flex:1;min-width:130px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 12px;border-radius:6px}
.team-input:focus{outline:none;border-color:var(--active-color)}
.team-input::placeholder{color:var(--muted)}
.at-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--muted);align-self:center}
.add-game-btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.add-game-btn:hover{border-color:var(--active-color);color:var(--active-color)}
.proj-section{margin-bottom:22px}
.proj-section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.18em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.proj-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.proj-cards{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeup .25s ease both;--sport-color:var(--active-color)}
.pcard.high{border-left:3px solid var(--green)}
.pcard.medium{border-left:3px solid var(--yellow)}
.pcard.low{border-left:3px solid var(--dim)}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pcard-top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015)}
.pcard-league{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--sport-color)}
.pcard-conf{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em;padding:2px 8px;border-radius:3px}
.pcard-conf.high{background:rgba(34,197,94,.1);color:var(--green)}
.pcard-conf.medium{background:rgba(245,158,11,.1);color:var(--yellow)}
.pcard-conf.low{background:rgba(255,255,255,.05);color:var(--muted)}
.pcard-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px}
.team-col{display:flex;flex-direction:column;align-items:center;gap:5px}
.logo-wrap{position:relative;display:inline-block}
.team-logo-lg{width:54px;height:54px;object-fit:contain}
.team-logo-ph{width:54px;height:54px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;color:var(--muted)}
.win-ring{position:absolute;inset:-3px;border-radius:11px;border:2.5px solid var(--sport-color);pointer-events:none}
.tc-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--text);line-height:1;text-align:center}
.tc-name.win{color:var(--sport-color)}
.tc-record{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--muted);text-align:center}
.tc-score{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;line-height:1}
.tc-score.win{color:var(--sport-color)}
.tc-pct{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted)}
.tc-pct.win{color:var(--sport-color)}
.mid-col{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 12px}
.mid-at{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;color:var(--dim)}
.mid-spread{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:3px 8px;white-space:nowrap;text-align:center}
.pcard-foot{display:flex;align-items:center;padding:8px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,0.015);gap:8px}
.bar-wrap{flex:1}
.bar-lbls{display:flex;justify-content:space-between;margin-bottom:3px}
.bar-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;color:var(--muted)}
.sim-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.sim-fill{height:100%;border-radius:2px;background:var(--sport-color);transition:width .9s cubic-bezier(.4,0,.2,1)}
.foot-copy{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.foot-copy:hover{border-color:var(--sport-color);color:var(--sport-color)}
.foot-copy.ok{color:var(--green);border-color:var(--green)}
.ai-btn{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid rgba(139,92,246,0.4);background:rgba(139,92,246,0.08);color:#a78bfa;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:4px}
.ai-btn:hover{border-color:#a78bfa;background:rgba(139,92,246,0.15)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-panel{border-top:1px solid var(--border);padding:14px 16px;background:rgba(139,92,246,0.03)}
.ai-panel-header{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.16em;color:#a78bfa;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-panel-header::after{content:'';flex:1;height:1px;background:rgba(139,92,246,0.2)}
.ai-section{margin-bottom:10px}
.ai-section:last-child{margin-bottom:0}
.ai-section-title{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--muted);margin-bottom:4px}
.ai-section-body{font-size:12px;line-height:1.65;color:rgba(232,234,240,0.75)}
.ai-loading{display:flex;align-items:center;gap:8px;padding:6px 0;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#a78bfa;letter-spacing:.06em}
.ufc-body{display:grid;grid-template-columns:1fr 60px 1fr;align-items:center;padding:16px}
.fighter-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.fc-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;line-height:1.1;text-align:center}
.fc-name.win{color:var(--sport-color)}
.fc-method{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted)}
.fc-method.win{color:var(--sport-color)}
.fc-pct{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted)}
.fc-pct.win{color:var(--sport-color)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1c1f2e;border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;padding:10px 20px;border-radius:7px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spin-sm{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,0.2);border-top:2px solid currentColor;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.spin-ai{width:11px;height:11px;border-radius:50%;border:2px solid rgba(139,92,246,0.2);border-top:2px solid #a78bfa;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1e2130;border-radius:2px}
</style>
</head>

function getRecord(lg,n){const db=RECORDS[lg]||{};if(db[n])return db[n];const l=n.toLowerCase();for(const[k,v]of Object.entries(db)){if(k.toLowerCase().includes(l)||l.includes(k.toLowerCase().split(" ").pop().replace(/s$/,"")))return v;}return null;}
function simulate(away,home,lg,n=1000){if(lg==="UFC")return simUFC(away,home,n);const range=SCORE_RANGES[lg];const aS=getStr(away),hS=getStr(home)*1.035,tot=aS+hS;const aProb=aS/tot;let aWins=0,totA=0,totH=0;for(let i=0;i<n;i++){const mid=(range.min+range.max)/2,vari=(range.max-range.min)/4;let aScore=Math.round(mid*(aS/0.5)*0.5+mid*0.5+randNorm()*vari*0.6);let hScore=Math.round(mid*(hS/0.5)*0.5+mid*0.5+randNorm()*vari*0.6);const edge=(aProb-0.5)*range.spread*2;aScore=Math.round(aScore+edge*0.5);hScore=Math.round(hScore-edge*0.5);if(lg==="NHL"||lg==="MLB"){aScore=Math.max(0,Math.round(aScore/10));hScore=Math.max(0,Math.round(hScore/10));while(aScore===hScore){if(Math.random()>0.5)aScore++;else hScore++;}}aScore=Math.max(range.min,aScore);hScore=Math.max(range.min,hScore);if(aScore>hScore)aWins++;totA+=aScore;totH+=hScore;}const aPct=(aWins/n)*100,hPct=100-aPct,pA=Math.round(totA/n),pH=Math.round(totH/n),spd=pA-pH;const conf=Math.abs(aPct-50)>=15?"high":Math.abs(aPct-50)>=7?"medium":"low";return{away,home,lg,aPct,hPct,pA,pH,winner:aPct>hPct?away:home,spread:spd>0?`${away.split(" ").pop()} -${Math.abs(spd).toFixed(1)}`:`${home.split(" ").pop()} -${Math.abs(spd).toFixed(1)}`,confidence:conf,sims:n,isUFC:false};}
function simUFC(f1,f2,n=1000){const s1=getStr(f1)||0.75,s2=getStr(f2)||0.75,tot=s1+s2;let w1=0;const mcts={};for(let i=0;i<n;i++){if(Math.random()<s1/tot)w1++;const m=UFC_METHODS[Math.floor(Math.random()*UFC_METHODS.length)];mcts[m]=(mcts[m]||0)+1;}const p1=(w1/n)*100,p2=100-p1;const method=Object.entries(mcts).sort((a,b)=>b[1]-a[1])[0][0];const conf=Math.abs(p1-50)>=15?"high":Math.abs(p1-50)>=7?"medium":"low";return{away:f1,home:f2,lg:"UFC",aPct:p1,hPct:p2,winner:p1>p2?f1:f2,method,confidence:conf,sims:n,isUFC:true};}
async function getAI(idx){const r=projections[league][idx];if(!r)return;const key=`${r.away}|${r.home}`;if(aiCache[league][key]&&aiCache[league][key]!=="loading")return;aiCache[league][key]="loading";render();const aRec=getRecord(league,r.away)||"N/A",hRec=getRecord(league,r.home)||"N/A";const prompt=`You are a sharp sports analyst. Analyze this ${r.lg} game: ${r.away} (${aRec}) @ ${r.home} (${hRec}). Model projects ${r.away.split(" ").pop()} ${r.pA}-${r.home.split(" ").pop()} ${r.pH}, win probability ${r.away} ${r.aPct.toFixed(1)}% vs ${r.home} ${r.hPct.toFixed(1)}%.\n\nReturn ONLY valid JSON, no markdown:\n{"form":"2-3 sentences on recent form and hot/cold streaks for each team","h2h":"1-2 sentences on head-to-head history","injuries":"1-2 sentences on key injury concerns","breakdown":"2-3 sentence sharp betting analysis and angle"}`;
try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})});const data=await res.json();const text=data.content?.[0]?.text||"{}";aiCache[league][key]=JSON.parse(text.replace(/```json|```/g,"").trim());}catch(e){aiCache[league][key]={form:"Analysis unavailable.",h2h:"—",injuries:"—",breakdown:"Check connection and try again."};}render();}
async function fetchSchedule(){const cfg=LEAGUES[league];const btn=document.getElementById("fetchBtn");const icon=document.getElementById("fetchIcon");btn.disabled=true;icon.innerHTML=`<span class="spin-sm"></span>`;const url=`https://api.the-odds-api.com/v4/sports/${cfg.key}/odds/?apiKey=${ODDS_KEY}&regions=us&markets=h2h&oddsFormat=american`;try{const res=await fetch(url);if(!res.ok)throw new Error(`HTTP ${res.status}`);const data=await res.json();const rem=res.headers.get("x-requests-remaining");if(rem)document.getElementById("reqBadge").textContent=`${rem} API REQUESTS LEFT`;const now=new Date();schedules[league]=data.filter(g=>new Date(g.commence_time)>new Date(now.getTime()-3*60*60*1000)).sort((a,b)=>new Date(a.commence_time)-new Date(b.commence_time)).map(g=>({away:g.away_team,home:g.home_team,time:new Date(g.commence_time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),id:g.id}));selected[league]=new Set(schedules[league].map((_,i)=>i));projections[league]=[];aiCache[league]={};showToast(`✓ ${schedules[league].length} games loaded`);}catch(e){showToast(`Failed: ${e.message}`);}btn.disabled=false;icon.textContent="↓";render();}
async function runSims(){const sel=[...selected[league]];if(!sel.length){showToast("Select at least one game");return;}const btn=document.getElementById("runBtn");const icon=document.getElementById("runIcon");const txt=document.getElementById("runTxt");btn.disabled=true;icon.innerHTML=`<span class="spin-sm"></span>`;txt.textContent="SIMULATING...";await new Promise(r=>setTimeout(r,30));projections[league]=sel.map(i=>simulate(schedules[league][i].away,schedules[league][i].home,league,1000));aiCache[league]={};btn.disabled=false;icon.textContent="▶";txt.textContent="RUN SIMULATIONS";document.getElementById("metaPill").textContent=`${projections[league].length*1000} TOTAL SIMS`;render();}
function pickText(r){const cfg=LEAGUES[r.lg];const w=Math.max(r.aPct,r.hPct).toFixed(1);if(r.isUFC)return`🥊 UFC\n${r.away} vs ${r.home}\n✦ WINNER: ${r.winner} (${w}%)\n✦ METHOD: ${r.method}\n✦ CONFIDENCE: ${r.confidence.toUpperCase()}\n📊 1,000 simulations`;return`${cfg.icon} ${r.lg}\n${r.away} @ ${r.home}\n✦ WINNER: ${r.winner} (${w}%)\n✦ SCORE: ${r.away.split(" ").pop()} ${r.pA} – ${r.home.split(" ").pop()} ${r.pH}\n✦ SPREAD: ${r.spread}\n✦ CONFIDENCE: ${r.confidence.toUpperCase()}\n📊 1,000 simulations`;}
function copyPick(idx){const r=(projections[league]||[])[idx];if(!r)return;navigator.clipboard.writeText(pickText(r)).then(()=>{const b=document.querySelector(`[data-pidx="${idx}"] .foot-copy`);if(b){b.textContent="✓ COPIED";b.classList.add("ok");setTimeout(()=>{b.textContent="⎘ COPY";b.classList.remove("ok");},2000);}});}
function copyAll(){const rs=projections[league]||[];if(!rs.length){showToast("Run simulations first");return;}const now=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});const txt=`━━━━━━━━━━━━━━━━━━━━━\n🎯 ${league} PROJECTIONS\n${now}\n━━━━━━━━━━━━━━━━━━━━━\n\n`+rs.map(r=>pickText(r)).join("\n\n─────────────────────\n\n")+`\n\n━━━━━━━━━━━━━━━━━━━━━\n⚡ EdgeCalc Pro · 1,000 sims/game`;navigator.clipboard.writeText(txt).then(()=>showToast(`✓ ${rs.length} projections copied`));}
function abbr(n){return n.split(" ").slice(-1)[0].substring(0,5).toUpperCase();}
function aiPanelHTML(r){const key=`${r.away}|${r.home}`,d=aiCache[league][key];if(!d)return"";if(d==="loading")return`<div class="ai-panel"><div class="ai-panel-header">⚡ AI ANALYSIS</div><div class="ai-loading"><span class="spin-ai"></span> Analyzing matchup...</div></div>`;return`<div class="ai-panel"><div class="ai-panel-header">⚡ AI ANALYSIS</div><div class="ai-section"><div class="ai-section-title">📈 RECENT FORM</div><div class="ai-section-body">${d.form||"—"}</div></div><div class="ai-section"><div class="ai-section-title">🔁 HEAD-TO-HEAD</div><div class="ai-section-body">${d.h2h||"—"}</div></div><div class="ai-section"><div class="ai-section-title">🏥 INJURY REPORT</div><div class="ai-section-body">${d.injuries||"—"}</div></div><div class="ai-section"><div class="ai-section-title">🎯 SHARP BREAKDOWN</div><div class="ai-section-body">${d.breakdown||"—"}</div></div></div>`;}
function scheduleHTML(){const games=schedules[league];const sel=selected[league];let html=`<div class="schedule-header"><div class="section-label">TODAY'S SCHEDULE</div><button class="add-manual" onclick="toggleAddRow()">+ MANUAL ADD</button></div>`;if(showAddRow[league]){html+=`<div class="add-row"><input class="team-input" id="awayIn" placeholder="Away team"/><span class="at-label">@</span><input class="team-input" id="homeIn" placeholder="Home team"/><button class="add-game-btn" onclick="addManual()">ADD</button></div>`;}if(!games.length){html+=`<div style="padding:20px 0;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);letter-spacing:.1em">Click LOAD SCHEDULE or add manually.</div></div>`;}else{const selAll=sel.size===games.length;html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><button onclick="toggleAll()" style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">${selAll?"DESELECT ALL":"SELECT ALL"}</button><span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted)">${sel.size}/${games.length} selected</span></div><div class="schedule-list">`;games.forEach((g,i)=>{const isSel=sel.has(i);const aRec=getRecord(league,g.away),hRec=getRecord(league,g.home);html+=`<div class="sched-item${isSel?" selected":""}" onclick="toggleGame(${i})"><div class="sched-time">${g.time||"TBD"}</div><div class="sched-teams"><div class="sched-team away">${sLogoHTML(g.away)}<div class="sched-team-info"><div class="sched-team-name">${g.away}</div>${aRec?`<div class="sched-record">${aRec}</div>`:""}</div></div><div class="sched-at">@</div><div class="sched-team home">${sLogoHTML(g.home)}<div class="sched-team-info"><div class="sched-team-name">${g.home}</div>${hRec?`<div class="sched-record">${hRec}</div>`:""}</div></div></div><div class="sched-check">${isSel?"✓":""}</div><button class="sched-remove" onclick="removeGame(event,${i})">✕</button></div>`;});html+=`</div>`;}return html;}
function projCardHTML(r,idx){const cfg=LEAGUES[r.lg],color=cfg.color,isAwayWin=r.winner===r.away;const aRec=getRecord(r.lg,r.away),hRec=getRecord(r.lg,r.home);const confLbl=r.confidence==="high"?"🔥 HIGH CONF":r.confidence==="medium"?"✓ MEDIUM":"~ LOW";const key=`${r.away}|${r.home}`,aiLoading=aiCache[league][key]==="loading";if(r.isUFC){return`<div class="pcard ${r.confidence}" style="--sport-color:${color}" data-pidx="${idx}"><div class="pcard-top"><span class="pcard-league">${cfg.icon} UFC</span><span class="pcard-conf ${r.confidence}">${confLbl}</span></div><div class="ufc-body"><div class="fighter-col"><div class="fc-name${isAwayWin?" win":""}">${r.away}</div><div class="fc-method${isAwayWin?" win":""}">${isAwayWin?r.method:"—"}</div><div class="fc-pct${isAwayWin?" win":""}">${r.aPct.toFixed(1)}% WIN</div></div><div class="mid-col"><div class="mid-at">VS</div></div><div class="fighter-col"><div class="fc-name${!isAwayWin?" win":""}">${r.home}</div><div class="fc-method${!isAwayWin?" win":""}">${!isAwayWin?r.method:"—"}</div><div class="fc-pct${!isAwayWin?" win":""}">${r.hPct.toFixed(1)}% WIN</div></div></div><div class="pcard-foot"><div class="bar-wrap"><div class="bar-lbls"><span class="bar-lbl">${r.away.split(" ").pop().toUpperCase()}</span><span class="bar-lbl">${r.home.split(" ").pop().toUpperCase()}</span></div><div class="sim-bar"><div class="sim-fill" style="width:${r.aPct}%"></div></div></div><button class="ai-btn" onclick="getAI(${idx})" ${aiLoading?"disabled":""}>${aiLoading?'<span class="spin-ai"></span> LOADING':'⚡ AI BREAKDOWN'}</button><button class="foot-copy" onclick="copyPick(${idx})">⎘ COPY</button></div>${aiPanelHTML(r)}</div>`;}
return`<div class="pcard ${r.confidence}" style="--sport-color:${color}" data-pidx="${idx}"><div class="pcard-top"><span class="pcard-league">${cfg.icon} ${r.lg}</span><span class="pcard-conf ${r.confidence}">${confLbl}</span></div><div class="pcard-body"><div class="team-col">${lgLogoHTML(r.away,isAwayWin)}<div class="tc-name${isAwayWin?" win":""}">${abbr(r.away)}</div>${aRec?`<div class="tc-record">${aRec}</div>`:""}<div class="tc-score${isAwayWin?" win":""}">${r.pA}</div><div class="tc-pct${isAwayWin?" win":""}">${r.aPct.toFixed(1)}%</div></div><div class="mid-col"><div class="mid-at">@</div><div class="mid-spread">${r.spread}</div></div><div class="team-col">${lgLogoHTML(r.home,!isAwayWin)}<div class="tc-name${!isAwayWin?" win":""}">${abbr(r.home)}</div>${hRec?`<div class="tc-record">${hRec}</div>`:""}<div class="tc-score${!isAwayWin?" win":""}">${r.pH}</div><div class="tc-pct${!isAwayWin?" win":""}">${r.hPct.toFixed(1)}%</div></div></div><div class="pcard-foot"><div class="bar-wrap"><div class="bar-lbls"><span class="bar-lbl">${abbr(r.away)}</span><span class="bar-lbl">${abbr(r.home)}</span></div><div class="sim-bar"><div class="sim-fill" style="width:${r.aPct}%"></div></div></div><button class="ai-btn" onclick="getAI(${idx})" ${aiLoading?"disabled":""}>${aiLoading?'<span class="spin-ai"></span> LOADING':'⚡ AI BREAKDOWN'}</button><button class="foot-copy" onclick="copyPick(${idx})">⎘ COPY</button></div>${aiPanelHTML(r)}</div>`;}
function render(){const cfg=LEAGUES[league];document.documentElement.style.setProperty('--active-color',cfg.color);document.getElementById("timeBadge").textContent=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});document.getElementById("leagueBar").innerHTML=Object.entries(LEAGUES).map(([l,c])=>`<button class="ltab${l===league?" active":""}" style="--active-color:${c.color}" onclick="switchLeague('${l}')">${c.icon} ${l}<span class="ltab-count" style="background:${c.color}">${schedules[l].length||""}</span></button>`).join("");document.getElementById("scheduleSection").innerHTML=scheduleHTML();const rs=projections[league];const el=document.getElementById("projectionsSection");if(!rs.length){el.innerHTML="";return;}const high=rs.filter(r=>r.confidence==="high"),med=rs.filter(r=>r.confidence==="medium"),low=rs.filter(r=>r.confidence==="low");let html=`<div style="height:1px;background:var(--border);margin:4px 0 20px"></div>`;if(high.length)html+=`<div class="proj-section"><div class="proj-section-label">🔥 HIGH CONFIDENCE</div><div class="proj-cards">${high.map(r=>projCardHTML(r,rs.indexOf(r))).join("")}</div></div>`;if(med.length)html+=`<div class="proj-section"><div class="proj-section-label">✓ MEDIUM CONFIDENCE</div><div class="proj-cards">${med.map(r=>projCardHTML(r,rs.indexOf(r))).join("")}</div></div>`;if(low.length)html+=`<div class="proj-section"><div class="proj-section-label">~ LOW CONFIDENCE</div><div class="proj-cards">${low.map(r=>projCardHTML(r,rs.indexOf(r))).join("")}</div></div>`;el.innerHTML=html;}
function switchLeague(l){league=l;render();}
function toggleGame(i){if(selected[league].has(i))selected[league].delete(i);else selected[league].add(i);projections[league]=[];render();}
function toggleAll(){const s=selected[league],g=schedules[league];if(s.size===g.length)selected[league]=new Set();else selected[league]=new Set(g.map((_,i)=>i));projections[league]=[];render();}
function removeGame(e,i){e.stopPropagation();schedules[league].splice(i,1);selected[league]=new Set([...selected[league]].filter(x=>x!==i).map(x=>x>i?x-1:x));projections[league]=[];render();}
function toggleAddRow(){showAddRow[league]=!showAddRow[league];render();}
function addManual(){const a=document.getElementById("awayIn")?.value.trim(),h=document.getElementById("homeIn")?.value.trim();if(!a||!h){showToast("Enter both teams");return;}const idx=schedules[league].length;schedules[league].push({away:a,home:h,time:"",id:`manual-${Date.now()}`});selected[league].add(idx);projections[league]=[];showAddRow[league]=false;render();}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
setInterval(()=>{document.getElementById("timeBadge").textContent=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});},30000);
render();
</script>
</body>
</html>
